  <text x="70" y="108" font-family="PingFang SC, Arial, sans-serif" font-size="18" fill="#475569">把文件记忆、结构化记忆、显式 remember、Reflector 和注入预算放进同一条治理链。</text>

  <rect x="90" y="220" width="200" height="96" rx="16" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  <text x="190" y="275" text-anchor="middle" font-family="PingFang SC, Arial, sans-serif" font-size="26" font-weight="700" fill="#1e3a8a">User Fact</text>

  <rect x="350" y="140" width="220" height="96" rx="16" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
  <text x="460" y="186" text-anchor="middle" font-family="PingFang SC, Arial, sans-serif" font-size="24" font-weight="700" fill="#166534">AGENTS.md</text>
  <text x="460" y="214" text-anchor="middle" font-family="PingFang SC, Arial, sans-serif" font-size="17" fill="#166534">global / account / chat</text>

  <rect x="350" y="300" width="220" height="96" rx="16" fill="#e0f2fe" stroke="#0284c7" stroke-width="2"/>
  <text x="460" y="346" text-anchor="middle" font-family="PingFang SC, Arial, sans-serif" font-size="24" font-weight="700" fill="#0f4c81">Structured Memory</text>
  <text x="460" y="374" text-anchor="middle" font-family="PingFang SC, Arial, sans-serif" font-size="17" fill="#0f4c81">category / confidence / source</text>

  <rect x="650" y="220" width="220" height="96" rx="16" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <text x="760" y="266" text-anchor="middle" font-family="PingFang SC, Arial, sans-serif" font-size="24" font-weight="700" fill="#92400e">Retrieval Gate</text>
  <text x="760" y="294" text-anchor="middle" font-family="PingFang SC, Arial, sans-serif" font-size="17" fill="#92400e">相关性 / 预算 / 作用域</text>

  <rect x="940" y="220" width="180" height="96" rx="16" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
  <text x="1030" y="275" text-anchor="middle" font-family="PingFang SC, Arial, sans-serif" font-size="26" font-weight="700" fill="#991b1b">Prompt</text>

