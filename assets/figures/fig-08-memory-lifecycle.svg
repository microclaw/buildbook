  <text x="460" y="574" text-anchor="middle" font-family="PingFang SC, Arial, sans-serif" font-size="17" fill="#334155">fast-path / 去重 / supersede</text>

  <rect x="700" y="500" width="220" height="96" rx="16" fill="#ffffff" stroke="#94a3b8" stroke-width="2"/>
  <text x="810" y="545" text-anchor="middle" font-family="PingFang SC, Arial, sans-serif" font-size="24" font-weight="700" fill="#1f2937">Reflector</text>
