<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760">
  <rect width="1200" height="760" fill="#fbfaf6"/>
  <text x="70" y="70" font-family="PingFang SC, Arial, sans-serif" font-size="34" font-weight="700" fill="#1f2937">图 18-1  Day 1 / Week 1 / Month 1 交付路线</text>
  <text x="70" y="108" font-family="PingFang SC, Arial, sans-serif" font-size="18" fill="#475569">把“能运行”推进到“能长期使用”，再推进到“可托管”。</text>

  <line x1="120" y1="360" x2="1080" y2="360" stroke="#334155" stroke-width="6" stroke-linecap="round"/>

  <circle cx="240" cy="360" r="36" fill="#dbeafe" stroke="#2563eb" stroke-width="3"/>
  <text x="240" y="370" text-anchor="middle" font-family="PingFang SC, Arial, sans-serif" font-size="22" font-weight="700" fill="#1e3a8a">D1</text>

  <circle cx="600" cy="360" r="36" fill="#dcfce7" stroke="#16a34a" stroke-width="3"/>
  <text x="600" y="370" text-anchor="middle" font-family="PingFang SC, Arial, sans-serif" font-size="22" font-weight="700" fill="#166534">W1</text>

  <circle cx="960" cy="360" r="36" fill="#fef3c7" stroke="#d97706" stroke-width="3"/>
  <text x="960" y="370" text-anchor="middle" font-family="PingFang SC, Arial, sans-serif" font-size="22" font-weight="700" fill="#92400e">M1</text>

  <rect x="110" y="170" width="260" height="130" rx="18" fill="#ffffff" stroke="#94a3b8" stroke-width="2"/>
  <text x="240" y="215" text-anchor="middle" font-family="PingFang SC, Arial, sans-serif" font-size="28" font-weight="700" fill="#1f2937">Day 1</text>
  <text x="240" y="248" text-anchor="middle" font-family="PingFang SC, Arial, sans-serif" font-size="18" fill="#334155">跑通 Web 主链路</text>
  <text x="240" y="278" text-anchor="middle" font-family="PingFang SC, Arial, sans-serif" font-size="18" fill="#334155">验证对话 / session / metrics</text>

  <rect x="470" y="170" width="260" height="130" rx="18" fill="#ffffff" stroke="#94a3b8" stroke-width="2"/>
  <text x="600" y="215" text-anchor="middle" font-family="PingFang SC, Arial, sans-serif" font-size="28" font-weight="700" fill="#1f2937">Week 1</text>
  <text x="600" y="248" text-anchor="middle" font-family="PingFang SC, Arial, sans-serif" font-size="18" fill="#334155">补齐渠道 / 记忆 / 调度</text>
  <text x="600" y="278" text-anchor="middle" font-family="PingFang SC, Arial, sans-serif" font-size="18" fill="#334155">验证一个最小扩展场景</text>

  <rect x="830" y="170" width="260" height="130" rx="18" fill="#ffffff" stroke="#94a3b8" stroke-width="2"/>
  <text x="960" y="215" text-anchor="middle" font-family="PingFang SC, Arial, sans-serif" font-size="28" font-weight="700" fill="#1f2937">Month 1</text>
  <text x="960" y="248" text-anchor="middle" font-family="PingFang SC, Arial, sans-serif" font-size="18" fill="#334155">安全姿态 / 观测 / 门禁 / 回滚</text>
  <text x="960" y="278" text-anchor="middle" font-family="PingFang SC, Arial, sans-serif" font-size="18" fill="#334155">进入可托管状态</text>

  <rect x="160" y="500" width="160" height="82" rx="16" fill="#ffffff" stroke="#94a3b8" stroke-width="2"/>
  <text x="240" y="548" text-anchor="middle" font-family="PingFang SC, Arial, sans-serif" font-size="22" font-weight="700" fill="#1f2937">可运行</text>

  <rect x="520" y="500" width="160" height="82" rx="16" fill="#ffffff" stroke="#94a3b8" stroke-width="2"/>
  <text x="600" y="548" text-anchor="middle" font-family="PingFang SC, Arial, sans-serif" font-size="22" font-weight="700" fill="#1f2937">可持续使用</text>

  <rect x="880" y="500" width="160" height="82" rx="16" fill="#ffffff" stroke="#94a3b8" stroke-width="2"/>
  <text x="960" y="548" text-anchor="middle" font-family="PingFang SC, Arial, sans-serif" font-size="22" font-weight="700" fill="#1f2937">可托管</text>
