<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760">
  <rect width="1200" height="760" fill="#fbfaf6"/>
  <text x="70" y="70" font-family="PingFang SC, Arial, sans-serif" font-size="34" font-weight="700" fill="#1f2937">图 7-1  工具治理链路</text>
  <text x="70" y="108" font-family="PingFang SC, Arial, sans-serif" font-size="18" fill="#475569">模型表达意图，runtime 注入真实上下文，再经过审批、隔离、路径和网络控制后执行。</text>

  <rect x="70" y="230" width="180" height="92" rx="16" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  <text x="160" y="285" text-anchor="middle" font-family="PingFang SC, Arial, sans-serif" font-size="27" font-weight="700" fill="#1e3a8a">Model Intent</text>

  <rect x="300" y="230" width="210" height="92" rx="16" fill="#e0f2fe" stroke="#0284c7" stroke-width="2"/>
  <text x="405" y="274" text-anchor="middle" font-family="PingFang SC, Arial, sans-serif" font-size="24" font-weight="700" fill="#0f4c81">Runtime Context</text>
  <text x="405" y="302" text-anchor="middle" font-family="PingFang SC, Arial, sans-serif" font-size="17" fill="#0f4c81">auth / chat_id / working dir</text>

  <rect x="560" y="230" width="180" height="92" rx="16" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
  <text x="650" y="285" text-anchor="middle" font-family="PingFang SC, Arial, sans-serif" font-size="27" font-weight="700" fill="#166534">Registry</text>

  <rect x="800" y="180" width="290" height="190" rx="18" fill="#ffffff" stroke="#94a3b8" stroke-width="2"/>
  <text x="825" y="226" font-family="PingFang SC, Arial, sans-serif" font-size="24" font-weight="700" fill="#1f2937">治理控制点</text>
  <text x="825" y="266" font-family="PingFang SC, Arial, sans-serif" font-size="18" fill="#334155">1. 风险分级 / approval gate</text>
  <text x="825" y="299" font-family="PingFang SC, Arial, sans-serif" font-size="18" fill="#334155">2. sandbox / execution strategy</text>
  <text x="825" y="332" font-family="PingFang SC, Arial, sans-serif" font-size="18" fill="#334155">3. path guard / URL policy</text>

  <path d="M250 276 H300" stroke="#334155" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M510 276 H560" stroke="#334155" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M740 276 H800" stroke="#334155" stroke-width="3" marker-end="url(#arrow)"/>

  <rect x="160" y="500" width="220" height="96" rx="16" fill="#ffffff" stroke="#94a3b8" stroke-width="2"/>
  <text x="270" y="555" text-anchor="middle" font-family="PingFang SC, Arial, sans-serif" font-size="25" font-weight="700" fill="#1f2937">Hook</text>
  <text x="270" y="582" text-anchor="middle" font-family="PingFang SC, Arial, sans-serif" font-size="17" fill="#334155">Before / After Tool Call</text>

  <rect x="470" y="500" width="260" height="96" rx="16" fill="#ffffff" stroke="#94a3b8" stroke-width="2"/>
  <text x="600" y="555" text-anchor="middle" font-family="PingFang SC, Arial, sans-serif" font-size="25" font-weight="700" fill="#1f2937">Tool Execution</text>
  <text x="600" y="582" text-anchor="middle" font-family="PingFang SC, Arial, sans-serif" font-size="17" fill="#334155">bash / file / web / schedule</text>

  <rect x="820" y="500" width="220" height="96" rx="16" fill="#ffffff" stroke="#94a3b8" stroke-width="2"/>
  <text x="930" y="555" text-anchor="middle" font-family="PingFang SC, Arial, sans-serif" font-size="25" font-weight="700" fill="#1f2937">Audit Trail</text>
  <text x="930" y="582" text-anchor="middle" font-family="PingFang SC, Arial, sans-serif" font-size="17" fill="#334155">result / metrics / logs</text>

  <path d="M945 370 V500" stroke="#334155" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M380 548 H470" stroke="#334155" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M730 548 H820" stroke="#334155" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M270 500 V390 H880" fill="none" stroke="#94a3b8" stroke-width="3"/>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#334155"/>
    </marker>
  </defs>
</svg>
