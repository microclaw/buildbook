<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760">
  <rect width="1200" height="760" fill="#fbfaf6"/>
  <text x="70" y="70" font-family="PingFang SC, Arial, sans-serif" font-size="34" font-weight="700" fill="#1f2937">图 6-1  process_with_agent 统一循环</text>
  <text x="70" y="108" font-family="PingFang SC, Arial, sans-serif" font-size="18" fill="#475569">恢复、注入、决策、工具回灌、压缩、审批和事件流都在这条状态机里汇合。</text>

  <rect x="100" y="170" width="200" height="82" rx="16" fill="#dbeafe" stroke="#2563eb" stroke-width="2"/>
  <text x="200" y="220" text-anchor="middle" font-family="PingFang SC, Arial, sans-serif" font-size="26" font-weight="700" fill="#1e3a8a">Load Session</text>

  <rect x="360" y="170" width="220" height="82" rx="16" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
  <text x="470" y="220" text-anchor="middle" font-family="PingFang SC, Arial, sans-serif" font-size="26" font-weight="700" fill="#166534">Inject Memory</text>

  <rect x="640" y="170" width="180" height="82" rx="16" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <text x="730" y="220" text-anchor="middle" font-family="PingFang SC, Arial, sans-serif" font-size="26" font-weight="700" fill="#92400e">LLM Call</text>

  <path d="M300 211 H360" stroke="#334155" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M580 211 H640" stroke="#334155" stroke-width="3" marker-end="url(#arrow)"/>

  <polygon points="930,150 1060,211 930,272 800,211" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
  <text x="930" y="203" text-anchor="middle" font-family="PingFang SC, Arial, sans-serif" font-size="23" font-weight="700" fill="#991b1b">tool_use?</text>
  <text x="930" y="232" text-anchor="middle" font-family="PingFang SC, Arial, sans-serif" font-size="17" fill="#991b1b">stop_reason</text>

  <path d="M820 211 H800" stroke="#334155" stroke-width="3" marker-end="url(#arrow)"/>

  <rect x="770" y="390" width="320" height="96" rx="16" fill="#ffffff" stroke="#94a3b8" stroke-width="2"/>
  <text x="930" y="433" text-anchor="middle" font-family="PingFang SC, Arial, sans-serif" font-size="26" font-weight="700" fill="#1f2937">Execute Tool</text>
  <text x="930" y="462" text-anchor="middle" font-family="PingFang SC, Arial, sans-serif" font-size="17" fill="#334155">approval / timeout / fingerprint / result append</text>

  <rect x="120" y="560" width="260" height="92" rx="16" fill="#ffffff" stroke="#94a3b8" stroke-width="2"/>
  <text x="250" y="613" text-anchor="middle" font-family="PingFang SC, Arial, sans-serif" font-size="25" font-weight="700" fill="#1f2937">Compaction</text>

  <rect x="450" y="560" width="300" height="92" rx="16" fill="#ffffff" stroke="#94a3b8" stroke-width="2"/>
  <text x="600" y="613" text-anchor="middle" font-family="PingFang SC, Arial, sans-serif" font-size="25" font-weight="700" fill="#1f2937">Persist + Events</text>

  <rect x="820" y="560" width="210" height="92" rx="16" fill="#ffffff" stroke="#94a3b8" stroke-width="2"/>
  <text x="925" y="613" text-anchor="middle" font-family="PingFang SC, Arial, sans-serif" font-size="25" font-weight="700" fill="#1f2937">End Turn</text>

  <path d="M930 272 V390" stroke="#334155" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M770 438 C640 438, 620 300, 730 252" fill="none" stroke="#334155" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="640" y="360" font-family="PingFang SC, Arial, sans-serif" font-size="18" fill="#334155">yes: 回灌结果继续循环</text>

  <path d="M1060 211 H1110 V606 H1030" fill="none" stroke="#334155" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="1088" y="190" font-family="PingFang SC, Arial, sans-serif" font-size="18" fill="#334155">no</text>

  <path d="M250 560 V470 H770" fill="none" stroke="#94a3b8" stroke-width="3"/>
  <path d="M600 560 V520" fill="none" stroke="#94a3b8" stroke-width="3"/>
  <path d="M925 560 V520" fill="none" stroke="#94a3b8" stroke-width="3"/>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#334155"/>
    </marker>
  </defs>
</svg>
