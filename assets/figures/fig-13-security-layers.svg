<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#334155"/>
    </marker>
  </defs>

  <rect width="1200" height="760" fill="#fbfaf6"/>
  <text x="70" y="70" font-family="PingFang SC, Arial, sans-serif" font-size="34" font-weight="700" fill="#1f2937">图 13-1  多层安全防线</text>
  <text x="70" y="108" font-family="PingFang SC, Arial, sans-serif" font-size="18" fill="#475569">安全不是一个开关，而是一组从运行前、运行中到运行后的分层控制。</text>

  <!-- Shield shape background -->
  <path d="M600 145 L950 220 L950 480 L600 620 L250 480 L250 220 Z" fill="#f8f9fa" stroke="#d1d5db" stroke-width="1.5" opacity="0.5"/>

  <!-- Layer 1: Risk Classification + Approval -->
  <rect x="270" y="170" width="660" height="72" rx="16" fill="#fee2e2" stroke="#E85D5D" stroke-width="2.5"/>
  <text x="380" y="210" font-family="PingFang SC, Arial, sans-serif" font-size="22" font-weight="700" fill="#991b1b">第 1 层：风险分级与审批门</text>
  <text x="700" y="210" font-family="PingFang SC, Arial, sans-serif" font-size="14" fill="#991b1b">low / medium / high → auto / prompt / deny</text>

  <!-- Layer 2: Execution Strategy + Sandbox -->
  <rect x="290" y="260" width="620" height="72" rx="16" fill="#fef3c7" stroke="#E8A838" stroke-width="2.5"/>
  <text x="400" y="300" font-family="PingFang SC, Arial, sans-serif" font-size="22" font-weight="700" fill="#92400e">第 2 层：执行策略与 sandbox</text>
  <text x="700" y="300" font-family="PingFang SC, Arial, sans-serif" font-size="14" fill="#92400e">timeout / cgroup / chroot</text>

  <!-- Layer 3: Path + URL + Content -->
  <rect x="310" y="350" width="580" height="72" rx="16" fill="#dcfce7" stroke="#50B356" stroke-width="2.5"/>
  <text x="410" y="390" font-family="PingFang SC, Arial, sans-serif" font-size="22" font-weight="700" fill="#166534">第 3 层：路径 / URL / 内容校验</text>
  <text x="720" y="390" font-family="PingFang SC, Arial, sans-serif" font-size="14" fill="#166534">allow/deny list</text>

  <!-- Layer 4: Auth + Scope + Throttle -->
  <rect x="330" y="440" width="540" height="72" rx="16" fill="#dbeafe" stroke="#4A90D9" stroke-width="2.5"/>
  <text x="420" y="480" font-family="PingFang SC, Arial, sans-serif" font-size="22" font-weight="700" fill="#1e3a8a">第 4 层：鉴权 / 作用域 / 节流</text>
  <text x="720" y="480" font-family="PingFang SC, Arial, sans-serif" font-size="14" fill="#1e3a8a">JWT / rate limit</text>

  <!-- Layer 5: Audit + Self-check + Rollback -->
  <rect x="350" y="530" width="500" height="72" rx="16" fill="#ede9fe" stroke="#8B5CF6" stroke-width="2.5"/>
  <text x="440" y="570" font-family="PingFang SC, Arial, sans-serif" font-size="22" font-weight="700" fill="#5b21b6">第 5 层：审计 / 自检 / 回滚</text>
  <text x="710" y="570" font-family="PingFang SC, Arial, sans-serif" font-size="14" fill="#5b21b6">immutable log</text>

  <!-- Right side: Detail cards -->
  <rect x="960" y="160" width="210" height="95" rx="12" fill="#ffffff" stroke="#E85D5D" stroke-width="1.5"/>
  <text x="980" y="185" font-family="PingFang SC, Arial, sans-serif" font-size="15" font-weight="700" fill="#991b1b">审批控制</text>
  <text x="980" y="208" font-family="PingFang SC, Arial, sans-serif" font-size="12" fill="#475569">ToolRiskLevel 枚举</text>
  <text x="980" y="226" font-family="PingFang SC, Arial, sans-serif" font-size="12" fill="#475569">ApprovalGate trait</text>
  <text x="980" y="244" font-family="PingFang SC, Arial, sans-serif" font-size="12" fill="#475569">自动/手动/拒绝</text>

  <rect x="960" y="270" width="210" height="95" rx="12" fill="#ffffff" stroke="#E8A838" stroke-width="1.5"/>
  <text x="980" y="295" font-family="PingFang SC, Arial, sans-serif" font-size="15" font-weight="700" fill="#92400e">沙箱隔离</text>
  <text x="980" y="318" font-family="PingFang SC, Arial, sans-serif" font-size="12" fill="#475569">ExecutionStrategy 枚举</text>
  <text x="980" y="336" font-family="PingFang SC, Arial, sans-serif" font-size="12" fill="#475569">进程超时 / 内存上限</text>
  <text x="980" y="354" font-family="PingFang SC, Arial, sans-serif" font-size="12" fill="#475569">网络隔离 / 只读挂载</text>

  <rect x="960" y="380" width="210" height="75" rx="12" fill="#ffffff" stroke="#50B356" stroke-width="1.5"/>
  <text x="980" y="405" font-family="PingFang SC, Arial, sans-serif" font-size="15" font-weight="700" fill="#166534">路径守卫</text>
  <text x="980" y="425" font-family="PingFang SC, Arial, sans-serif" font-size="12" fill="#475569">PathGuard: 白名单目录</text>
  <text x="980" y="443" font-family="PingFang SC, Arial, sans-serif" font-size="12" fill="#475569">UrlPolicy: 域名/协议过滤</text>

  <rect x="960" y="470" width="210" height="75" rx="12" fill="#ffffff" stroke="#4A90D9" stroke-width="1.5"/>
  <text x="980" y="495" font-family="PingFang SC, Arial, sans-serif" font-size="15" font-weight="700" fill="#1e3a8a">鉴权节流</text>
  <text x="980" y="515" font-family="PingFang SC, Arial, sans-serif" font-size="12" fill="#475569">Web API: JWT + scope</text>
  <text x="980" y="533" font-family="PingFang SC, Arial, sans-serif" font-size="12" fill="#475569">请求限速 / 并发上限</text>

  <rect x="960" y="560" width="210" height="75" rx="12" fill="#ffffff" stroke="#8B5CF6" stroke-width="1.5"/>
  <text x="980" y="585" font-family="PingFang SC, Arial, sans-serif" font-size="15" font-weight="700" fill="#5b21b6">审计回滚</text>
  <text x="980" y="605" font-family="PingFang SC, Arial, sans-serif" font-size="12" fill="#475569">不可变审计日志</text>
  <text x="980" y="623" font-family="PingFang SC, Arial, sans-serif" font-size="12" fill="#475569">fingerprint 校验 / 自动回滚</text>

  <!-- Connecting lines -->
  <line x1="930" y1="206" x2="960" y2="206" stroke="#E85D5D" stroke-width="1.5"/>
  <line x1="910" y1="296" x2="960" y2="296" stroke="#E8A838" stroke-width="1.5"/>
  <line x1="890" y1="386" x2="960" y2="416" stroke="#50B356" stroke-width="1.5"/>
  <line x1="870" y1="476" x2="960" y2="506" stroke="#4A90D9" stroke-width="1.5"/>
  <line x1="850" y1="566" x2="960" y2="596" stroke="#8B5CF6" stroke-width="1.5"/>

  <!-- Bottom principle -->
  <rect x="120" y="660" width="960" height="60" rx="14" fill="#ffffff" stroke="#e5e7eb" stroke-width="1.5"/>
  <text x="150" y="695" font-family="PingFang SC, Arial, sans-serif" font-size="17" fill="#334155">核心原则：把宿主机执行、状态数据、凭据、渠道边界和扩展供应链分散到不同控制点，而不是依赖单一防护。</text>
</svg>
