<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#334155"/>
    </marker>
  </defs>

  <rect width="1200" height="760" fill="#fbfaf6"/>
  <text x="70" y="70" font-family="PingFang SC, Arial, sans-serif" font-size="34" font-weight="700" fill="#1f2937">图 11-1  Web 控制面架构</text>
  <text x="70" y="108" font-family="PingFang SC, Arial, sans-serif" font-size="18" fill="#475569">Browser 通过 Axum 路由访问认证、会话、配置和流式聊天，AppState 装配全部依赖。</text>

  <!-- Browser -->
  <rect x="60" y="300" width="160" height="100" rx="16" fill="#dbeafe" stroke="#4A90D9" stroke-width="2.5"/>
  <text x="140" y="345" text-anchor="middle" font-family="PingFang SC, Arial, sans-serif" font-size="22" font-weight="700" fill="#1e3a8a">Browser</text>
  <text x="140" y="375" text-anchor="middle" font-family="PingFang SC, Arial, sans-serif" font-size="14" fill="#1e3a8a">HTTP / WebSocket</text>

  <!-- Arrow to Axum -->
  <path d="M220 350 H300" stroke="#334155" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="260" y="340" text-anchor="middle" font-family="PingFang SC, Arial, sans-serif" font-size="13" fill="#475569">HTTPS</text>

  <!-- Axum Server -->
  <rect x="300" y="200" width="240" height="310" rx="18" fill="#ffffff" stroke="#50B356" stroke-width="2.5"/>
  <text x="420" y="240" text-anchor="middle" font-family="PingFang SC, Arial, sans-serif" font-size="22" font-weight="700" fill="#166534">Axum Server</text>
  <line x1="320" y1="255" x2="520" y2="255" stroke="#e5e7eb" stroke-width="1"/>

  <!-- Routes inside Axum -->
  <rect x="320" y="270" width="200" height="36" rx="8" fill="#dcfce7" stroke="#50B356" stroke-width="1.5"/>
  <text x="420" y="294" text-anchor="middle" font-family="monospace" font-size="14" fill="#166534">/api/auth</text>

  <rect x="320" y="316" width="200" height="36" rx="8" fill="#dcfce7" stroke="#50B356" stroke-width="1.5"/>
  <text x="420" y="340" text-anchor="middle" font-family="monospace" font-size="14" fill="#166534">/api/sessions</text>

  <rect x="320" y="362" width="200" height="36" rx="8" fill="#dcfce7" stroke="#50B356" stroke-width="1.5"/>
  <text x="420" y="386" text-anchor="middle" font-family="monospace" font-size="14" fill="#166534">/api/config</text>

  <rect x="320" y="408" width="200" height="36" rx="8" fill="#fef3c7" stroke="#E8A838" stroke-width="1.5"/>
  <text x="420" y="432" text-anchor="middle" font-family="monospace" font-size="14" fill="#92400e">/api/chat (SSE)</text>

  <rect x="320" y="454" width="200" height="36" rx="8" fill="#fef3c7" stroke="#E8A838" stroke-width="1.5"/>
  <text x="420" y="478" text-anchor="middle" font-family="monospace" font-size="14" fill="#92400e">/ws/stream</text>

  <!-- SSE/WebSocket label -->
  <rect x="160" y="550" width="200" height="50" rx="12" fill="#fef3c7" stroke="#E8A838" stroke-width="1.5"/>
  <text x="260" y="580" text-anchor="middle" font-family="PingFang SC, Arial, sans-serif" font-size="16" font-weight="600" fill="#92400e">SSE / WebSocket 流式</text>
  <path d="M260 550 L260 510 L300 478" fill="none" stroke="#E8A838" stroke-width="2" stroke-dasharray="5,3"/>

  <!-- Arrow from Axum to AppState -->
  <path d="M540 350 H620" stroke="#334155" stroke-width="3" marker-end="url(#arrow)"/>

  <!-- AppState -->
  <rect x="620" y="220" width="240" height="280" rx="18" fill="#ede9fe" stroke="#8B5CF6" stroke-width="2.5"/>
  <text x="740" y="260" text-anchor="middle" font-family="PingFang SC, Arial, sans-serif" font-size="22" font-weight="700" fill="#5b21b6">AppState</text>
  <line x1="640" y1="275" x2="840" y2="275" stroke="#d8b4fe" stroke-width="1"/>

  <text x="650" y="305" font-family="PingFang SC, Arial, sans-serif" font-size="15" fill="#5b21b6">db: SqlitePool</text>
  <text x="650" y="335" font-family="PingFang SC, Arial, sans-serif" font-size="15" fill="#5b21b6">config: AppConfig</text>
  <text x="650" y="365" font-family="PingFang SC, Arial, sans-serif" font-size="15" fill="#5b21b6">tool_registry: ToolRegistry</text>
  <text x="650" y="395" font-family="PingFang SC, Arial, sans-serif" font-size="15" fill="#5b21b6">memory: MemoryService</text>
  <text x="650" y="425" font-family="PingFang SC, Arial, sans-serif" font-size="15" fill="#5b21b6">scheduler: Scheduler</text>
  <text x="650" y="455" font-family="PingFang SC, Arial, sans-serif" font-size="15" fill="#5b21b6">channel_mgr: ChannelMgr</text>
  <text x="650" y="485" font-family="PingFang SC, Arial, sans-serif" font-size="15" fill="#5b21b6">metrics: MetricsHandle</text>

  <!-- Arrow from AppState to Agent Engine -->
  <path d="M860 360 H940" stroke="#334155" stroke-width="3" marker-end="url(#arrow)"/>

  <!-- Agent Engine -->
  <rect x="940" y="270" width="200" height="180" rx="18" fill="#fee2e2" stroke="#E85D5D" stroke-width="2.5"/>
  <text x="1040" y="310" text-anchor="middle" font-family="PingFang SC, Arial, sans-serif" font-size="20" font-weight="700" fill="#991b1b">Agent Engine</text>
  <line x1="960" y1="325" x2="1120" y2="325" stroke="#fca5a5" stroke-width="1"/>

  <text x="965" y="355" font-family="PingFang SC, Arial, sans-serif" font-size="14" fill="#991b1b">process_with_agent()</text>
  <text x="965" y="380" font-family="PingFang SC, Arial, sans-serif" font-size="14" fill="#991b1b">LLM call + tool loop</text>
  <text x="965" y="405" font-family="PingFang SC, Arial, sans-serif" font-size="14" fill="#991b1b">compaction</text>
  <text x="965" y="430" font-family="PingFang SC, Arial, sans-serif" font-size="14" fill="#991b1b">persist + events</text>

  <!-- Streaming output arrow back -->
  <path d="M940 440 C860 520, 600 540, 360 510" fill="none" stroke="#E8A838" stroke-width="2" stroke-dasharray="6,4" marker-end="url(#arrow)"/>
  <text x="680" y="535" font-family="PingFang SC, Arial, sans-serif" font-size="14" fill="#E8A838">AgentEvent stream → SSE / WS</text>

  <!-- Bottom: middleware labels -->
  <rect x="300" y="620" width="840" height="70" rx="14" fill="#f3f4f6" stroke="#d1d5db" stroke-width="1.5"/>
  <text x="340" y="660" font-family="PingFang SC, Arial, sans-serif" font-size="17" font-weight="600" fill="#374151">Middleware:</text>
  <text x="470" y="660" font-family="PingFang SC, Arial, sans-serif" font-size="15" fill="#6B7280">CORS  |  Auth Guard  |  Rate Limit  |  Request ID  |  Tracing Span  |  Error Handler</text>
</svg>
