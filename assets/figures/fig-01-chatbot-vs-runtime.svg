<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#334155"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#50B356"/>
    </marker>
  </defs>

  <rect width="1200" height="760" fill="#fbfaf6"/>
  <text x="70" y="70" font-family="PingFang SC, Arial, sans-serif" font-size="34" font-weight="700" fill="#1f2937">图 1-1  聊天机器人 vs. Agent Runtime</text>
  <text x="70" y="108" font-family="PingFang SC, Arial, sans-serif" font-size="18" fill="#475569">从单轮请求-响应，到多步循环、工具调用、记忆管理和调度的完整运行时。</text>

  <!-- Divider -->
  <line x1="580" y1="130" x2="580" y2="730" stroke="#cbd5e1" stroke-width="2" stroke-dasharray="8,6"/>

  <!-- LEFT SIDE: Chatbot -->
  <text x="280" y="168" text-anchor="middle" font-family="PingFang SC, Arial, sans-serif" font-size="28" font-weight="700" fill="#6B7280">聊天机器人</text>
  <text x="280" y="198" text-anchor="middle" font-family="PingFang SC, Arial, sans-serif" font-size="16" fill="#94a3b8">Simple Request / Response</text>

  <!-- User box -->
  <rect x="80" y="260" width="150" height="70" rx="14" fill="#dbeafe" stroke="#4A90D9" stroke-width="2"/>
  <text x="155" y="302" text-anchor="middle" font-family="PingFang SC, Arial, sans-serif" font-size="22" font-weight="700" fill="#1e3a8a">用户</text>

  <!-- Arrow right: question -->
  <path d="M230 280 H330" stroke="#334155" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="280" y="272" text-anchor="middle" font-family="PingFang SC, Arial, sans-serif" font-size="14" fill="#6B7280">提问</text>

  <!-- LLM box -->
  <rect x="330" y="260" width="150" height="70" rx="14" fill="#fef3c7" stroke="#E8A838" stroke-width="2"/>
  <text x="405" y="302" text-anchor="middle" font-family="PingFang SC, Arial, sans-serif" font-size="22" font-weight="700" fill="#92400e">LLM</text>

  <!-- Arrow left: response -->
  <path d="M330 340 H230" stroke="#334155" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="280" y="360" text-anchor="middle" font-family="PingFang SC, Arial, sans-serif" font-size="14" fill="#6B7280">回答</text>

  <!-- No-state indicator -->
  <rect x="140" y="400" width="280" height="40" rx="10" fill="#f3f4f6" stroke="#e5e7eb" stroke-width="1"/>
  <text x="280" y="426" text-anchor="middle" font-family="PingFang SC, Arial, sans-serif" font-size="16" fill="#94a3b8">无状态 / 无记忆 / 无工具</text>

  <!-- Limitations -->
  <rect x="80" y="470" width="430" height="250" rx="16" fill="#ffffff" stroke="#e5e7eb" stroke-width="2"/>
  <text x="105" y="505" font-family="PingFang SC, Arial, sans-serif" font-size="20" font-weight="700" fill="#6B7280">局限性</text>
  <line x1="105" y1="515" x2="480" y2="515" stroke="#e5e7eb" stroke-width="1"/>
  <text x="105" y="545" font-family="PingFang SC, Arial, sans-serif" font-size="17" fill="#E85D5D">&#x2717;  无工具调用能力</text>
  <text x="105" y="575" font-family="PingFang SC, Arial, sans-serif" font-size="17" fill="#E85D5D">&#x2717;  无持久化记忆</text>
  <text x="105" y="605" font-family="PingFang SC, Arial, sans-serif" font-size="17" fill="#E85D5D">&#x2717;  无会话恢复与 compaction</text>
  <text x="105" y="635" font-family="PingFang SC, Arial, sans-serif" font-size="17" fill="#E85D5D">&#x2717;  无后台调度</text>
  <text x="105" y="665" font-family="PingFang SC, Arial, sans-serif" font-size="17" fill="#E85D5D">&#x2717;  无安全治理与审批</text>
  <text x="105" y="695" font-family="PingFang SC, Arial, sans-serif" font-size="17" fill="#E85D5D">&#x2717;  单轮对话，上下文即丢失</text>

  <!-- RIGHT SIDE: Agent Runtime -->
  <text x="890" y="168" text-anchor="middle" font-family="PingFang SC, Arial, sans-serif" font-size="28" font-weight="700" fill="#1f2937">Agent Runtime</text>
  <text x="890" y="198" text-anchor="middle" font-family="PingFang SC, Arial, sans-serif" font-size="16" fill="#475569">Multi-step Loop with Governance</text>

  <!-- Central Agent Loop box -->
  <rect x="730" y="230" width="320" height="80" rx="16" fill="#dcfce7" stroke="#50B356" stroke-width="2.5"/>
  <text x="890" y="266" text-anchor="middle" font-family="PingFang SC, Arial, sans-serif" font-size="22" font-weight="700" fill="#166534">Agent Loop (统一循环)</text>
  <text x="890" y="294" text-anchor="middle" font-family="PingFang SC, Arial, sans-serif" font-size="14" fill="#166534">决策 → 工具调用 → 回灌 → 再决策</text>

  <!-- Loop arrow -->
  <path d="M1050 250 C1090 250, 1100 280, 1090 300 C1080 315, 1050 310, 1050 310" fill="none" stroke="#50B356" stroke-width="2.5" marker-end="url(#arrow-green)"/>

  <!-- Tools box -->
  <rect x="620" y="345" width="130" height="55" rx="12" fill="#dbeafe" stroke="#4A90D9" stroke-width="2"/>
  <text x="685" y="379" text-anchor="middle" font-family="PingFang SC, Arial, sans-serif" font-size="18" font-weight="600" fill="#1e3a8a">Tools</text>
  <path d="M770 305 L710 345" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Memory box -->
  <rect x="775" y="345" width="130" height="55" rx="12" fill="#ede9fe" stroke="#8B5CF6" stroke-width="2"/>
  <text x="840" y="379" text-anchor="middle" font-family="PingFang SC, Arial, sans-serif" font-size="18" font-weight="600" fill="#5b21b6">Memory</text>
  <line x1="860" y1="310" x2="860" y2="345" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Storage box -->
  <rect x="930" y="345" width="130" height="55" rx="12" fill="#fef3c7" stroke="#E8A838" stroke-width="2"/>
  <text x="995" y="379" text-anchor="middle" font-family="PingFang SC, Arial, sans-serif" font-size="18" font-weight="600" fill="#92400e">Storage</text>
  <path d="M1000 305 L1000 345" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Scheduler box -->
  <rect x="620" y="430" width="130" height="55" rx="12" fill="#fee2e2" stroke="#E85D5D" stroke-width="2"/>
  <text x="685" y="464" text-anchor="middle" font-family="PingFang SC, Arial, sans-serif" font-size="18" font-weight="600" fill="#991b1b">Scheduler</text>

  <!-- Channels box -->
  <rect x="775" y="430" width="130" height="55" rx="12" fill="#e0f2fe" stroke="#0284c7" stroke-width="2"/>
  <text x="840" y="464" text-anchor="middle" font-family="PingFang SC, Arial, sans-serif" font-size="18" font-weight="600" fill="#0f4c81">Channels</text>

  <!-- Security box -->
  <rect x="930" y="430" width="130" height="55" rx="12" fill="#f3f4f6" stroke="#6B7280" stroke-width="2"/>
  <text x="995" y="464" text-anchor="middle" font-family="PingFang SC, Arial, sans-serif" font-size="18" font-weight="600" fill="#374151">Security</text>

  <!-- Capabilities list -->
  <rect x="630" y="520" width="490" height="200" rx="16" fill="#ffffff" stroke="#e5e7eb" stroke-width="2"/>
  <text x="655" y="555" font-family="PingFang SC, Arial, sans-serif" font-size="20" font-weight="700" fill="#1f2937">核心能力</text>
  <line x1="655" y1="565" x2="1090" y2="565" stroke="#e5e7eb" stroke-width="1"/>
  <text x="655" y="595" font-family="PingFang SC, Arial, sans-serif" font-size="17" fill="#50B356">&#x2713;  多步推理与工具调用循环</text>
  <text x="655" y="625" font-family="PingFang SC, Arial, sans-serif" font-size="17" fill="#50B356">&#x2713;  持久化会话与记忆注入</text>
  <text x="655" y="655" font-family="PingFang SC, Arial, sans-serif" font-size="17" fill="#50B356">&#x2713;  后台调度 (cron / once / recall)</text>
  <text x="655" y="685" font-family="PingFang SC, Arial, sans-serif" font-size="17" fill="#50B356">&#x2713;  多渠道接入与安全治理</text>
  <text x="655" y="715" font-family="PingFang SC, Arial, sans-serif" font-size="17" fill="#50B356">&#x2713;  可观测 (Metrics / Traces / Logs)</text>
</svg>
