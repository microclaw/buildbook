<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#334155"/>
    </marker>
  </defs>

  <rect width="1200" height="760" fill="#fbfaf6"/>
  <text x="70" y="70" font-family="PingFang SC, Arial, sans-serif" font-size="34" font-weight="700" fill="#1f2937">图 15-1  测试金字塔</text>
  <text x="70" y="108" font-family="PingFang SC, Arial, sans-serif" font-size="18" fill="#475569">从底层单元测试到顶层黑盒测试，覆盖 Agent Runtime 的全部验证层次。</text>

  <!-- Pyramid: 3 layers -->
  <!-- Bottom: Unit Tests (widest) -->
  <polygon points="130,640 780,640 600,440 310,440" fill="#dcfce7" stroke="#50B356" stroke-width="2.5"/>
  <text x="455" y="530" text-anchor="middle" font-family="PingFang SC, Arial, sans-serif" font-size="24" font-weight="700" fill="#166534">单元测试 Unit Tests</text>
  <text x="455" y="565" text-anchor="middle" font-family="PingFang SC, Arial, sans-serif" font-size="15" fill="#166534">数量最多 / 速度最快 / 隔离性最强</text>

  <!-- Detail items for unit tests -->
  <text x="250" y="600" font-family="PingFang SC, Arial, sans-serif" font-size="14" fill="#166534">config 解析</text>
  <text x="390" y="600" font-family="PingFang SC, Arial, sans-serif" font-size="14" fill="#166534">权限控制</text>
  <text x="510" y="600" font-family="PingFang SC, Arial, sans-serif" font-size="14" fill="#166534">状态机</text>
  <text x="610" y="600" font-family="PingFang SC, Arial, sans-serif" font-size="14" fill="#166534">记忆去重</text>

  <!-- Middle: Integration Tests -->
  <polygon points="310,440 600,440 530,280 380,280" fill="#fef3c7" stroke="#E8A838" stroke-width="2.5"/>
  <text x="455" y="355" text-anchor="middle" font-family="PingFang SC, Arial, sans-serif" font-size="22" font-weight="700" fill="#92400e">集成测试</text>
  <text x="455" y="385" text-anchor="middle" font-family="PingFang SC, Arial, sans-serif" font-size="14" fill="#92400e">DB / Scheduler / API 端到端</text>
  <text x="455" y="410" text-anchor="middle" font-family="PingFang SC, Arial, sans-serif" font-size="14" fill="#92400e">Integration Tests</text>

  <!-- Top: Black-box Tests (narrowest) -->
  <polygon points="380,280 530,280 485,170 425,170" fill="#fee2e2" stroke="#E85D5D" stroke-width="2.5"/>
  <text x="455" y="225" text-anchor="middle" font-family="PingFang SC, Arial, sans-serif" font-size="18" font-weight="700" fill="#991b1b">黑盒</text>
  <text x="455" y="250" text-anchor="middle" font-family="PingFang SC, Arial, sans-serif" font-size="13" fill="#991b1b">全链路</text>

  <!-- Axis labels -->
  <!-- Left side: speed -->
  <text x="100" y="230" font-family="PingFang SC, Arial, sans-serif" font-size="15" fill="#6B7280" transform="rotate(-90, 100, 400)">速度 ←  慢                                           快 →</text>

  <!-- Right side: coverage scope -->
  <text x="810" y="230" font-family="PingFang SC, Arial, sans-serif" font-size="15" fill="#6B7280" transform="rotate(90, 810, 400)">覆盖范围 ←  窄                                      广 →</text>

  <!-- Side panel: LLM Behavior Tests -->
  <rect x="870" y="170" width="280" height="280" rx="18" fill="#ede9fe" stroke="#8B5CF6" stroke-width="2.5"/>
  <text x="1010" y="210" text-anchor="middle" font-family="PingFang SC, Arial, sans-serif" font-size="22" font-weight="700" fill="#5b21b6">LLM 行为测试</text>
  <line x1="890" y1="225" x2="1130" y2="225" stroke="#d8b4fe" stroke-width="1"/>

  <text x="900" y="260" font-family="PingFang SC, Arial, sans-serif" font-size="15" fill="#5b21b6">prompt 回归测试</text>
  <text x="900" y="290" font-family="PingFang SC, Arial, sans-serif" font-size="15" fill="#5b21b6">工具选择准确率断言</text>
  <text x="900" y="320" font-family="PingFang SC, Arial, sans-serif" font-size="15" fill="#5b21b6">幻觉检测 (fact check)</text>
  <text x="900" y="350" font-family="PingFang SC, Arial, sans-serif" font-size="15" fill="#5b21b6">多轮对话一致性</text>
  <text x="900" y="380" font-family="PingFang SC, Arial, sans-serif" font-size="15" fill="#5b21b6">审批/拒绝边界</text>
  <text x="900" y="410" font-family="PingFang SC, Arial, sans-serif" font-size="15" fill="#5b21b6">Token 预算遵守</text>
  <text x="900" y="440" font-family="PingFang SC, Arial, sans-serif" font-size="15" fill="#5b21b6">非确定性 → 统计断言</text>

  <!-- Arrow from pyramid to LLM panel -->
  <path d="M600 300 H870" stroke="#8B5CF6" stroke-width="2" stroke-dasharray="6,4" marker-end="url(#arrow)"/>
  <text x="735" y="290" text-anchor="middle" font-family="PingFang SC, Arial, sans-serif" font-size="13" fill="#8B5CF6">独立维度</text>

  <!-- Bottom: detail boxes for each layer -->
  <rect x="870" y="500" width="280" height="210" rx="16" fill="#ffffff" stroke="#e5e7eb" stroke-width="1.5"/>
  <text x="895" y="530" font-family="PingFang SC, Arial, sans-serif" font-size="17" font-weight="700" fill="#1f2937">各层典型用例</text>
  <line x1="895" y1="540" x2="1125" y2="540" stroke="#e5e7eb" stroke-width="1"/>

  <circle cx="910" cy="570" r="6" fill="#50B356"/>
  <text x="925" y="575" font-family="PingFang SC, Arial, sans-serif" font-size="14" fill="#475569">单元: ToolRegistry::resolve()</text>

  <circle cx="910" cy="600" r="6" fill="#50B356"/>
  <text x="925" y="605" font-family="PingFang SC, Arial, sans-serif" font-size="14" fill="#475569">单元: MemoryGate::filter()</text>

  <circle cx="910" cy="630" r="6" fill="#E8A838"/>
  <text x="925" y="635" font-family="PingFang SC, Arial, sans-serif" font-size="14" fill="#475569">集成: POST /api/chat → DB</text>

  <circle cx="910" cy="660" r="6" fill="#E8A838"/>
  <text x="925" y="665" font-family="PingFang SC, Arial, sans-serif" font-size="14" fill="#475569">集成: Scheduler 定时触发</text>

  <circle cx="910" cy="690" r="6" fill="#E85D5D"/>
  <text x="925" y="695" font-family="PingFang SC, Arial, sans-serif" font-size="14" fill="#475569">黑盒: Telegram → Agent → 回复</text>
</svg>
